<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Budget Tracker - Advanced JS Patterns</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Budget Tracker</h1>
        
        <div class="input-group">
            <input type="text" id="desc" placeholder="Description (e.g. Rent)" title="Enter transaction description">
            <input type="number" id="amt" placeholder="Amount (R)" title="Enter transaction amount">
            <select id="cat" placeholder="Select category" title="Select transaction category">
                <option value="general">General</option>
                <option value="food">Food</option>
                <option value="transport">Transport</option>
                <option value="salary">Salary</option>
                <option value="Rent">Rent</option>
                <option value="Groceries">Groceries</option>
            </select>
        </div>
        
        <div class="btn-group">
            <button onclick="handleAdd('income')" class="btn btn-neon">Add Income</button>
            <button onclick="handleAdd('expense')" class="btn btn-rainbow">Add Expense</button>
        </div>

        <div id="status" class="status"></div>

        <div id="output">
            <div class="summary-box" id="summary">Balance: R0.00</div>
            <div id="transactionList"></div>
        </div>
    </div>

    <script src="budgetTracker.js"></script>
    <script src="app.js"></script>
</body>
</html>
